<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioFlow - Spectrum Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            color: #ffffff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #2a2a3a;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #38d9a9, #6c5ce7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .lang-select {
            background: #1a1a2e;
            border: 1px solid #2a2a3a;
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }

        .lang-select:hover {
            border-color: #38d9a9;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #888;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
        }

        .status-dot.connected {
            background: #38d9a9;
            box-shadow: 0 0 10px #38d9a9;
        }

        .status-dot.disconnected {
            background: #e74c3c;
        }

        .visualizer-container {
            margin-top: 30px;
            background: #12121a;
            border-radius: 16px;
            padding: 30px;
            border: 1px solid #2a2a3a;
        }

        .spectrum-canvas {
            width: 100%;
            height: 300px;
            background: #0a0a0f;
            border-radius: 8px;
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
        }

        .control-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tooltip-trigger {
            cursor: help;
            border-bottom: 1px dashed #666;
            position: relative;
        }

        .tooltip-trigger::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2e;
            border: 1px solid #38d9a9;
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
            max-width: 280px;
            white-space: normal;
            text-transform: none;
            letter-spacing: 0;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s, visibility 0.2s;
            z-index: 100;
            pointer-events: none;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .tooltip-trigger:hover::after {
            opacity: 1;
            visibility: visible;
        }

        select, input[type="range"] {
            background: #1a1a2e;
            border: 1px solid #2a2a3a;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }

        select:hover, input[type="range"]:hover {
            border-color: #38d9a9;
        }

        input[type="range"] {
            width: 150px;
            accent-color: #38d9a9;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: #1a1a2e;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #2a2a3a;
        }

        .stat-label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: #38d9a9;
            margin-top: 4px;
        }

        .error-message {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid #e74c3c;
            color: #e74c3c;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        @media (max-width: 768px) {
            .visualizer-container {
                padding: 15px;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .tooltip-trigger::after {
                left: 0;
                transform: none;
                right: 0;
                max-width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AudioFlow</h1>
            <div class="header-right">
                <select class="lang-select" id="langSelect">
                    <option value="en">English</option>
                    <option value="zh">中文</option>
                    <option value="ja">日本語</option>
                </select>
                <div class="status">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">Disconnected</span>
                </div>
            </div>
        </header>

        <div class="visualizer-container">
            <canvas id="spectrumCanvas" class="spectrum-canvas"></canvas>

            <div class="controls">
                <div class="control-group">
                    <label class="control-label">
                        <span class="tooltip-trigger" data-tooltip="" id="labelSmoothing">Smoothing</span>
                    </label>
                    <select id="smoothingSelect">
                        <option value="gravity" id="optGravity">Gravity (Attack/Decay)</option>
                        <option value="lerp" id="optLerp">Linear Interpolation</option>
                        <option value="none" id="optNone">None</option>
                    </select>
                </div>
                <div class="control-group">
                    <label class="control-label">
                        <span class="tooltip-trigger" data-tooltip="" id="labelAttack">Attack Rate</span>
                    </label>
                    <input type="range" id="attackRange" min="0.1" max="1.0" step="0.1" value="0.6">
                </div>
                <div class="control-group">
                    <label class="control-label">
                        <span class="tooltip-trigger" data-tooltip="" id="labelDecay">Decay Rate</span>
                    </label>
                    <input type="range" id="decayRange" min="0.1" max="1.0" step="0.1" value="0.2">
                </div>
                <div class="control-group">
                    <label class="control-label">
                        <span class="tooltip-trigger" data-tooltip="" id="labelWeighting">Weighting</span>
                    </label>
                    <select id="weightingSelect">
                        <option value="A" id="optA">A-Weighting</option>
                        <option value="C" id="optC">C-Weighting</option>
                        <option value="Linear" id="optLinear">Linear</option>
                    </select>
                </div>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-label" id="statFrame">Frame</div>
                    <div class="stat-value" id="frameCount">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label" id="statPeak">Peak dB</div>
                    <div class="stat-value" id="peakDb">-∞</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label" id="statAvg">Avg dB</div>
                    <div class="stat-value" id="avgDb">-∞</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label" id="statFps">FPS</div>
                    <div class="stat-value" id="fps">0</div>
                </div>
            </div>

            <div class="error-message" id="errorMessage">
                Unable to connect to AudioFlow server. Please ensure the backend is running.
            </div>
        </div>
    </div>

    <script>
        const translations = {
            en: {
                title: 'AudioFlow - Spectrum Visualizer',
                disconnected: 'Disconnected',
                connected: 'Connected',
                labelSmoothing: 'Smoothing',
                labelAttack: 'Attack Rate',
                labelDecay: 'Decay Rate',
                labelWeighting: 'Weighting',
                optGravity: 'Gravity (Attack/Decay)',
                optLerp: 'Linear Interpolation',
                optNone: 'None',
                optA: 'A-Weighting',
                optC: 'C-Weighting',
                optLinear: 'Linear',
                statFrame: 'Frame',
                statPeak: 'Peak dB',
                statAvg: 'Avg dB',
                statFps: 'FPS',
                errorConnect: 'Unable to connect to AudioFlow server. Please ensure the backend is running.',
                tooltipSmoothing: 'Smoothing algorithm for frequency magnitude changes. Gravity provides natural attack/decay response.',
                tooltipAttack: 'Speed of magnitude increase toward new higher values. Higher = faster response to sudden loud sounds.',
                tooltipDecay: 'Speed of magnitude decrease toward lower values. Higher = faster fade after sound stops.',
                tooltipWeighting: 'Frequency weighting curve. A simulates human ear sensitivity, C is flatter, Linear is unweighted.'
            },
            zh: {
                title: 'AudioFlow - 频谱可视化',
                disconnected: '未连接',
                connected: '已连接',
                labelSmoothing: '平滑算法',
                labelAttack: '攻击速率',
                labelDecay: '衰减速率',
                labelWeighting: '频率加权',
                optGravity: '重力 (攻击/衰减)',
                optLerp: '线性插值',
                optNone: '无',
                optA: 'A加权',
                optC: 'C加权',
                optLinear: '线性',
                statFrame: '帧',
                statPeak: '峰值 dB',
                statAvg: '平均 dB',
                statFps: '帧率',
                errorConnect: '无法连接到 AudioFlow 服务器，请确保后端正在运行。',
                tooltipSmoothing: '频率幅度变化的平滑算法。重力模式提供自然的攻击/衰减响应。',
                tooltipAttack: '幅度向新的更高值增加的速度。越高 = 对突然响亮声音的响应越快。',
                tooltipDecay: '幅度向更低的值下降的速度。越高 = 声音停止后衰减越快。',
                tooltipWeighting: '频率加权曲线。A模拟人耳灵敏度，C更平坦，Linear为不加权。'
            },
            ja: {
                title: 'AudioFlow - スペクトラムビジュアライザー',
                disconnected: '未接続',
                connected: '接続済み',
                labelSmoothing: 'スムージング',
                labelAttack: 'アタック',
                labelDecay: 'ディケイ',
                labelWeighting: '周波数重み',
                optGravity: 'グラビティ (アタック/ディケイ)',
                optLerp: '線形補間',
                optNone: 'なし',
                optA: 'A重み',
                optC: 'C重み',
                optLinear: '線形',
                statFrame: 'フレーム',
                statPeak: 'ピーク dB',
                statAvg: '平均 dB',
                statFps: 'FPS',
                errorConnect: 'AudioFlowサーバーに接続できません。バックエンドが実行されていることを確認してください。',
                tooltipSmoothing: '周波数マグニチュード変化のスムージングアルゴリズム。グラビティは自然なアタック/ディケイ応答を提供します。',
                tooltipAttack: '新しい高い値へのマグニチュード増加の速度。高い = 急に大きな音に対する反応が速くなります。',
                tooltipDecay: 'より低い値へのマグニチュード減少の速度。高い = 音が止んだ後の減衰が速くなります。',
                tooltipWeighting: '周波数重み曲線。Aは人間の耳の感度を模擬、Cはより平坦、Linearは無重みです。'
            }
        };

        const canvas = document.getElementById('spectrumCanvas');
        const ctx = canvas.getContext('2d');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const frameCountEl = document.getElementById('frameCount');
        const peakDbEl = document.getElementById('peakDb');
        const avgDbEl = document.getElementById('avgDb');
        const fpsEl = document.getElementById('fps');
        const errorMessage = document.getElementById('errorMessage');
        const langSelect = document.getElementById('langSelect');

        let ws = null;
        let animationId = null;
        let lastFrameTime = performance.now();
        let frameCount = 0;
        let fps = 0;
        let currentLang = 'en';

        function setLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            document.title = t.title;
            document.getElementById('labelSmoothing').textContent = t.labelSmoothing;
            document.getElementById('labelAttack').textContent = t.labelAttack;
            document.getElementById('labelDecay').textContent = t.labelDecay;
            document.getElementById('labelWeighting').textContent = t.labelWeighting;
            document.getElementById('optGravity').textContent = t.optGravity;
            document.getElementById('optLerp').textContent = t.optLerp;
            document.getElementById('optNone').textContent = t.optNone;
            document.getElementById('optA').textContent = t.optA;
            document.getElementById('optC').textContent = t.optC;
            document.getElementById('optLinear').textContent = t.optLinear;
            document.getElementById('statFrame').textContent = t.statFrame;
            document.getElementById('statPeak').textContent = t.statPeak;
            document.getElementById('statAvg').textContent = t.statAvg;
            document.getElementById('statFps').textContent = t.statFps;
            errorMessage.textContent = t.errorConnect;

            // Update tooltips
            document.getElementById('labelSmoothing').setAttribute('data-tooltip', t.tooltipSmoothing);
            document.getElementById('labelAttack').setAttribute('data-tooltip', t.tooltipAttack);
            document.getElementById('labelDecay').setAttribute('data-tooltip', t.tooltipDecay);
            document.getElementById('labelWeighting').setAttribute('data-tooltip', t.tooltipWeighting);

            // Update status text if disconnected
            if (statusText.textContent === 'Disconnected' || statusText.textContent === '未连接' || statusText.textContent === '未接続') {
                statusText.textContent = t.disconnected;
            }

            localStorage.setItem('audioflow_lang', lang);
        }

        langSelect.addEventListener('change', (e) => setLanguage(e.target.value));

        // Resize canvas to match container
        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width - 60;
            canvas.height = 300;
            drawFrame();
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Draw spectrum frame
        function drawFrame(magnitudes = []) {
            const width = canvas.width;
            const height = canvas.height;

            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, width, height);

            if (magnitudes.length === 0) {
                ctx.fillStyle = '#2a2a3a';
                for (let i = 0; i < 60; i++) {
                    const x = i * (width / 60);
                    const barHeight = height * 0.1;
                    ctx.fillRect(x, height - barHeight, width / 60 - 2, barHeight);
                }
                return;
            }

            const barCount = magnitudes.length;
            const barWidth = width / barCount;

            const gradient = ctx.createLinearGradient(0, height, 0, 0);
            gradient.addColorStop(0, '#38d9a9');
            gradient.addColorStop(0.5, '#6c5ce7');
            gradient.addColorStop(1, '#e74c3c');

            ctx.fillStyle = gradient;

            for (let i = 0; i < barCount; i++) {
                const magnitude = magnitudes[i];
                const normalized = Math.max(0, (magnitude + 60) / 60);
                const barHeight = normalized * height;

                const x = i * barWidth;
                ctx.fillRect(x, height - barHeight, barWidth - 1, barHeight);
            }

            ctx.strokeStyle = '#2a2a3a';
            ctx.lineWidth = 1;
            for (let i = 0; i < 5; i++) {
                const y = (height / 5) * i;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }

            ctx.fillStyle = '#666';
            ctx.font = '10px monospace';
            const labels = ['20Hz', '100Hz', '1kHz', '10kHz', '20kHz'];
            labels.forEach((label, i) => {
                const x = (width / 4) * i;
                ctx.fillText(label, x, height - 5);
            });
        }

        // Update stats display
        function updateStats(data) {
            frameCountEl.textContent = data.frame || 0;

            if (data.magnitudes && data.magnitudes.length > 0) {
                const peak = Math.max(...data.magnitudes);
                const avg = data.magnitudes.reduce((a, b) => a + b, 0) / data.magnitudes.length;
                peakDbEl.textContent = peak > -180 ? peak.toFixed(1) : '-∞';
                avgDbEl.textContent = avg > -180 ? avg.toFixed(1) : '-∞';
            }

            const now = performance.now();
            frameCount++;
            if (now - lastFrameTime >= 1000) {
                fps = Math.round(frameCount * 1000 / (now - lastFrameTime));
                fpsEl.textContent = fps;
                frameCount = 0;
                lastFrameTime = now;
            }

            drawFrame(data.magnitudes || []);
        }

        // Connect to WebSocket
        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;

            try {
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    statusDot.className = 'status-dot connected';
                    statusText.textContent = translations[currentLang].connected;
                    errorMessage.classList.remove('visible');
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        updateStats(data);
                    } catch (e) {
                        console.error('Failed to parse message:', e);
                    }
                };

                ws.onclose = () => {
                    statusDot.className = 'status-dot disconnected';
                    statusText.textContent = translations[currentLang].disconnected;
                    setTimeout(connect, 2000);
                };

                ws.onerror = () => {
                    errorMessage.classList.add('visible');
                    ws.close();
                };
            } catch (e) {
                errorMessage.classList.add('visible');
                setTimeout(connect, 2000);
            }
        }

        // Init language from localStorage
        const savedLang = localStorage.getItem('audioflow_lang') || 'en';
        langSelect.value = savedLang;
        setLanguage(savedLang);

        // Start
        drawFrame();
        connect();
    </script>
</body>
</html>
